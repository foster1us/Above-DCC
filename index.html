const mod = s => s<=3?-3:s>=18?3:(MOD_TABLE[s]||0);
const fm = m => m>=0?`+${m}`:`${m}`;
const rollDie = s => Math.floor(Math.random()*s)+1;
function rollDice(notation) {
  const m = notation.match(/(\d+)?d(\d+)([+-]\d+)?/);
  if (!m) return {total:0,rolls:[]};
  const count = parseInt(m[1]||"1"), sides = parseInt(m[2]), bonus = parseInt(m[3]||"0");
  const rolls = Array.from({length:count}, ()=>rollDie(sides));
  return {total: rolls.reduce((a,b)=>a+b,0)+bonus, rolls};
}

function parseRoll(notation) {
  const tokens = (notation||"").match(/[+-]?[^+-]+/g)||[];
  let rolls=[], total=0;
  for (const raw of tokens) {
    let t=raw.trim(), sign=1;
    if(t[0]==="-"){sign=-1;t=t.slice(1).trim();}
    else if(t[0]==="+") t=t.slice(1).trim();
    const dm=t.match(/^(\d*)d(\d+)$/i);
    if(dm){
      const c=parseInt(dm[1]||"1"),sides=parseInt(dm[2]);
      for(let i=0;i<c;i++){const r=rollDie(sides);rolls.push(r);total+=r*sign;}
    } else total+=(parseInt(t)||0)*sign;
  }
  return {rolls,total,notation};
}

const DEFAULT_CHAR = {
  name:"Zenith Wayfarer",level:2,title:"Seer",alignment:"Neutral",occupation:"Navigator",
  patron:"Yvrion",augur:"Battlefield +1 (damage rolls)",langs:"Common, Elf, Centaur",
  ab:{Strength:14,Agility:13,Stamina:11,Personality:9,Intelligence:13,Luck:14},
  currentLuck:14,hp:15,maxHp:15,speed:30,
  armorOn:true,shieldOn:true,wolfspearEquipped:true,
  spellsLost:{},
  equipment:["Backpack","Holy water (1 vial, 25gp)","Holy symbol","Spyglass","50' rope","Jar of honey","Candle/lantern","Grappling hook","Flint & steel","20 rations","Sausages & cured meats","Wolf's pelt","WHITE LIQUID","THE ORB","CUNEIFORM BOOK (worth a ton in LankMar)","BRONZE ROD"],
  treasure:{cp:0,sp:8,ep:0,gp:415,pp:0,other:"3 EMERALDS (10gp ea), gold chain (20gp), old bronze sword, tin & bronze coins"},

};

/* ================================================================
   COLORS
   ================================================================ */
const C = {
  bg:"#1a1714",bgMid:"#2a2520",bgCard:"#302b26",border:"#3d3832",
  gold:"#c9a84c",goldDim:"rgba(201,168,76,0.15)",
  text:"#e8dcc8",dim:"#8a8178",faint:"#5a5550",
  green:"#4ecca3",red:"#e74c3c",orange:"#e67e22",blue:"#5dade2",yellow:"#e8c84c",
};
const cardStyle = {background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px",marginBottom:6};
const btnStyle = {background:C.goldDim,border:`1px solid ${C.gold}`,color:C.gold,padding:"5px 10px",borderRadius:4,cursor:"pointer",fontFamily:"'Crimson Text',serif",fontSize:12};
const greenBtnStyle = {...btnStyle,background:"rgba(78,204,163,0.15)",borderColor:C.green,color:C.green};

const Section = ({children}) => (
  <div style={{display:"flex",alignItems:"center",gap:8,margin:"20px 0 10px",fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,letterSpacing:2,textTransform:"uppercase"}}>
    <span>◆</span> {children} <div style={{flex:1,height:1,background:"linear-gradient(to right, rgba(201,168,76,0.3), transparent)"}}/>
  </div>
);

/* ================================================================
   PERSISTENCE
   ================================================================ */
const SAVE_KEY = "dcc-zenith-v3";
function loadChar() {
  try { const s = localStorage.getItem(SAVE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return {...DEFAULT_CHAR};
}
function saveChar(c) { try { localStorage.setItem(SAVE_KEY, JSON.stringify(c)); } catch(e){} }

/* ================================================================
   APP
   ================================================================ */
function App() {
  const [char, setChar] = useState(() => loadChar());
  const [tab, setTab] = useState("stats");
  const [log, setLog] = useState(() => {
    try { const s = localStorage.getItem(SAVE_KEY+"_log"); if(s) return JSON.parse(s); } catch(e){}
    return [];
  });
  const [expanded, setExpanded] = useState({});
  const [edit, setEdit] = useState(false);
  const [diceOpen, setDiceOpen] = useState(false);
  const [rollResult, setRollResult] = useState(null);
  const [showOverlay, setShowOverlay] = useState(false);

  const [portraitOpen, setPortraitOpen] = useState(false);

  const lv = ELF_LEVELS[char.level]||ELF_LEVELS[2];
  const abilMod = useCallback(n => mod(char.ab[n]), [char.ab]);
  const luckMod = useMemo(() => mod(char.currentLuck), [char.currentLuck]);
  const frozenLuckMod = useMemo(() => mod(char.ab.Luck), [char.ab.Luck]); // Frozen at creation for Lethal Blow
  const armorFD = char.armorOn ? "1d12" : "1d4"; // Scale mail = 1d12, unarmored = 1d4
  // Base spell check: +4 per character sheet (CL 2 + INT +1 + misc +1)
  const spellCheck = 4;
  
  const ac = useMemo(() => {
    let a = 10 + abilMod("Agility");
    if (char.armorOn) a += 4;
    if (char.shieldOn) a += 2;
    return a;
  }, [char.armorOn, char.shieldOn, abilMod]);
  
  const initMod = useMemo(() => {
    let i = abilMod("Agility");
    if (char.wolfspearEquipped) i += 1;
    return i;
  }, [abilMod, char.wolfspearEquipped]);
  
  // SAVES: VTT-style — canonical derivation + homebrew/misc bonus to match character sheet
  // Sheet authority: Fort +2, Ref +1, Will +1 (base, before equipment)
  // Canonical: Fort = lv.fort(+1) + STA(0) = +1 → sheet +2 → misc +1
  //            Ref  = lv.ref(+1)  + AGI(+1) = +2 → sheet +1 → misc -1
  //            Will = lv.will(+1) + PER(0)  = +1 → sheet +1 → misc  0
  const SAVE_MISC = {Fortitude: 0, Reflex: 0, Willpower: 0};
  const saves = useMemo(() => {
    const base = {
      Fortitude: lv.fort + abilMod("Stamina") + SAVE_MISC.Fortitude,
      Reflex: lv.ref + abilMod("Agility") + SAVE_MISC.Reflex,
      Willpower: lv.will + abilMod("Personality") + SAVE_MISC.Willpower
    };
    if (char.shieldOn) base.Willpower += 2;
    if (char.wolfspearEquipped) base.Willpower += 1;
    return base;
  }, [lv, abilMod, char.shieldOn, char.wolfspearEquipped]);

  const meleeAtk = abilMod("Strength") + lv.atk;
  const rangedAtk = abilMod("Agility") + lv.atk;

  const weapons = useMemo(() => [
    {name:"Mithral Longsword",dmg:"1d8",melee:true,notes:"+1 magic, non-iron",totalAtk:meleeAtk+1,totalDmg:`1d8+${abilMod("Strength")+1}`},
    {name:"Wolfspear",dmg:"1d8",melee:true,notes:"+1 magic, +1 init, +1 will",totalAtk:meleeAtk+1,totalDmg:`1d8+${abilMod("Strength")+1}`},
    {name:"Longbow",dmg:"1d6",melee:false,range:"70/140/210",notes:"36 arrows",totalAtk:rangedAtk,totalDmg:"1d6"},
  ], [meleeAtk, rangedAtk, abilMod]);

  // Spells with lost state merged
  const spells = useMemo(() => SPELLS.map((s,i) => ({...s, lost: !!(char.spellsLost||{})[i]})), [char.spellsLost]);

  const upd = useCallback((fn) => setChar(p => { const n = JSON.parse(JSON.stringify(p)); fn(n); saveChar(n); return n; }), []);

  const addLog = useCallback((entry) => {
    const full = {...entry, id:Date.now(), time:new Date().toLocaleTimeString()};
    setLog(prev => {
      const next = [full, ...prev].slice(0,50);
      try { localStorage.setItem(SAVE_KEY+"_log", JSON.stringify(next)); } catch(e){}
      return next;
    });
    setRollResult(full);
    setShowOverlay(true);
    setTimeout(() => setShowOverlay(false), 2200);
  }, []);

  const doRoll = useCallback((notation, label) => {
    const r = parseRoll(notation);
    // Auto-lookup crit/fumble table results
    if (label === "Crit Die") {
      const critTotal = r.total + char.level;
      const result = CRIT_TABLE_II[Math.min(critTotal, 20)] || CRIT_TABLE_II[20];
      r.special = `Table ${lv.ct}, roll ${r.total}+${char.level}=${critTotal}: ${result}`;
      r.good = true;
    } else if (label === "Fumble Die") {
      const result = FUMBLE_TABLE[Math.min(r.total, 16)] || FUMBLE_TABLE[16];
      r.special = `Fumble ${r.total}: ${result}`;
    }
    addLog({label, ...r});
    return r;
  }, [addLog, char.level, lv]);

  const rollSave = useCallback((name) => {
    const bonus = saves[name];
    const r = rollDie(20);
    addLog({label:`${name} Save`, notation:`1d20${fm(bonus)}`, rolls:[r], total:r+bonus});
  }, [saves, addLog]);

  const rollAttack = useCallback((w) => {
    const r = rollDie(20);
    const total = r + w.totalAtk;
    const crit = r >= 20, fumble = r === 1;
    let special = null, critResult = null, fumbleResult = null;
    if (crit) {
      const cd = rollDice(lv.cd);
      const critTotal = cd.total + char.level;
      critResult = CRIT_TABLE_II[Math.min(critTotal, 20)] || CRIT_TABLE_II[20];
      special = `⚡ CRITICAL HIT! ${lv.cd}+${char.level} = ${critTotal}: ${critResult}`;
    } else if (fumble) {
      const fd = rollDice(char.armorOn ? armorFD : "1d4");
      fumbleResult = FUMBLE_TABLE[Math.min(fd.total, 16)] || FUMBLE_TABLE[16];
      special = `💀 FUMBLE! ${char.armorOn?armorFD:"1d4"} = ${fd.total}: ${fumbleResult}`;
    }
    addLog({
      label:`Attack: ${w.name}`, notation:`1d20${fm(w.totalAtk)}`, rolls:[r], total,
      special, good: crit
    });
  }, [addLog, lv, char.level, char.armorOn]);

  const rollSpellCheck = useCallback((idx) => {
    const sp = spells[idx];
    let r, rolls, note = "";
    if (sp.name === "Detect Magic") {
      const a=rollDie(10), b=rollDie(10); r=a+b; rolls=[a,b]; note=" (2d10)";
    } else { r=rollDie(20); rolls=[r]; }
    let bonus = spellCheck;
    if (sp.name === "Lethal Blow") bonus += frozenLuckMod;
    const total = r + bonus;
    const nat1 = rolls.length===1 && rolls[0]===1;
    const lost = total < 12;
    addLog({
      label:`Spell: ${sp.name}${note}`, notation:`${sp.name==="Detect Magic"?"2d10":"1d20"}${fm(bonus)}`,
      rolls, total,
      special: nat1?"NATURAL 1 — Misfire + Corruption!":lost?"SPELL LOST!":total>=28?"EXTRAORDINARY!":total>=20?"POWERFUL!":null,
      good: total>=20&&!nat1&&!lost
    });
    if (lost||nat1) upd(c => { c.spellsLost = {...(c.spellsLost||{}), [idx]: true}; });
  }, [spells, spellCheck, addLog, upd]);

  const doRest = useCallback((type) => {
    if (type === "overnight") {
      // Overnight rest: recover 1 HP, recover all spells
      upd(c => { c.hp = Math.min(c.maxHp, c.hp + 1); c.spellsLost = {}; });
      addLog({label:"OVERNIGHT REST",notation:"-",rolls:[],total:0,special:"All spells recovered. +1 HP.",good:true});
    } else {
      // Full day bed rest: recover 1 HD (1d6 for elf)
      const roll = Math.floor(Math.random()*6)+1;
      upd(c => { c.hp = Math.min(c.maxHp, c.hp + roll); c.spellsLost = {}; });
      addLog({label:"FULL DAY REST",notation:"1d6",rolls:[roll],total:roll,special:`All spells recovered. +${roll} HP (1d6).`,good:true});
    }
  }, [addLog, upd]);

  const S = {card:cardStyle, btn:btnStyle, greenBtn:greenBtnStyle};
  const hpPct = (char.hp/char.maxHp)*100;
  const hpColor = char.hp<=char.maxHp*0.25?C.red:char.hp<=char.maxHp*0.5?C.orange:C.green;
  const hpInputStyle = {width:50,fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:hpColor,background:"transparent",border:"none",textAlign:"center",outline:"none"};

  const tabs = [
    {id:"stats",icon:"⚔",label:"Stats"},{id:"combat",icon:"🗡",label:"Combat"},
    {id:"spells",icon:"✦",label:"Spells"},{id:"patron",icon:"◈",label:"Patron"},
    {id:"abilities",icon:"🧝",label:"Traits"},{id:"elf",icon:"📜",label:"Elf Ref"},{id:"gear",icon:"🎒",label:"Gear"},
    {id:"log",icon:"🎲",label:"Dice"},
  ];

  return (
    <div style={{maxWidth:920,margin:"0 auto",fontFamily:"'Crimson Text',Georgia,serif",color:C.text,minHeight:"100vh"}}>

      {portraitOpen && <div onClick={()=>setPortraitOpen(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
          <img src={PORTRAIT_SRC} alt="Zenith Wayfarer" style={{width:"50vmin",height:"50vmin",objectFit:"cover",borderRadius:12,border:"3px solid "+C.gold,boxShadow:"0 0 40px rgba(201,168,76,0.4)"}}/>
        </div>}

      {/* HEADER */}
      <div style={{background:`linear-gradient(180deg,${C.bgMid},${C.bg})`,borderBottom:`2px solid ${C.gold}`,padding:"16px 20px 10px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
          <div>
            <div style={{color:C.gold,fontSize:12,letterSpacing:4}}>᚛ ᚜</div>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:16,fontWeight:700,color:C.gold,letterSpacing:3}}>DUNGEON CRAWL CLASSICS</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button style={S.btn} onClick={()=>doRest("overnight")}>☽ Night Rest</button>
            <button style={S.btn} onClick={()=>doRest("fullday")}>🛏 Full Day Rest</button>
            <button style={{...S.btn,background:edit?C.gold:"transparent",color:edit?C.bg:C.gold}} onClick={()=>setEdit(!edit)}>{edit?"✓ Done":"✎ Edit"}</button>
          </div>
        </div>
        <div style={{display:"flex",flexWrap:"wrap",gap:"2px 14px",alignItems:"center",marginBottom:8}}>
          <img src={PORTRAIT_SRC} alt="Zenith Wayfarer" onClick={()=>setPortraitOpen(true)} style={{width:56,cursor:"pointer",height:56,borderRadius:"50%",border:`2px solid ${C.gold}`,objectFit:"cover"}} onError={e=>{e.target.style.display='none'}}/>
          <div>
            <span style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:22,display:"block"}}>{char.name}</span>
            <span style={{fontSize:13,color:C.dim}}>Level {char.level} Elf — {lv.title} • {char.alignment} • Patron: {char.patron}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {[
            {val:<><input type="number" value={char.hp} min={0} max={char.maxHp} onChange={e=>{const v=Math.max(0,Math.min(char.maxHp,parseInt(e.target.value)||0));upd(c=>{c.hp=v;});}} style={hpInputStyle}/>/<span style={{fontSize:13,color:C.dim}}>{char.maxHp}</span></>,label:"HP",style:{borderColor:hpColor}},
            {val:ac,label:"AC",sub:`${char.armorOn?"Armor ":""}${char.shieldOn?"Shield":""}`},
            {val:`${char.speed}'`,label:"SPD"},
            {val:fm(initMod),label:"INIT",sub:char.wolfspearEquipped?"w/ Wolfspear":"",click:()=>doRoll(`1d20${fm(initMod)}`,"Initiative")},

            {val:`${lv.cd}/${lv.ct}`,label:"Crit",click:()=>doRoll(lv.cd,"Crit Die")},

              <div style={{fontSize:10,color:C.dim,letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{q.label}</div>

      <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,background:"#221f1b",position:"sticky",top:0,zIndex:10,overflowX:"auto"}}>

          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:"1 1 auto",padding:"9px 6px",background:tab===t.id?"rgba(201,168,76,0.05)":"transparent",border:"none",borderBottom:tab===t.id?`2px solid ${C.gold}`:"2px solid transparent",color:tab===t.id?C.gold:C.dim,cursor:"pointer",fontFamily:"'Crimson Text',serif",fontSize:12,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
            <span style={{fontSize:15}}>{t.icon}</span><span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* CONTENT */}
      <div style={{padding:"12px 20px 100px"}}>

        {/* STATS TAB */}
        {tab==="stats" && <>
          <Section>Ability Scores</Section>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {ABILITY_NAMES.map(ab=>{
              const m=abilMod(ab); const cls=m>0?C.green:m<0?C.red:C.dim;
              return <div key={ab} style={S.card}>
                <div style={{textAlign:"center"}}>
                  <div style={{fontSize:12,color:C.gold,letterSpacing:1,fontWeight:700,fontFamily:"'Cinzel',serif"}}>{AB[ab]}</div>
                  <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:28,color:cls}}>{fm(m)}</div>
                  {edit ? <input type="number" value={char.ab[ab]} onChange={e=>upd(c=>{c.ab[ab]=parseInt(e.target.value)||3;})} style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:14,color:C.dim,background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:4,textAlign:"center",width:40}}/> : <div style={{fontSize:14,color:C.dim}}>{char.ab[ab]}</div>}
                  <div style={{fontSize:11,color:C.faint,marginTop:1}}>{ab}</div>
                </div>
              </div>;
            })}
          </div>

          <Section>Luck</Section>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            <div style={{...S.card,textAlign:"center",flex:"1 1 70px"}}><div style={{fontSize:10,color:C.dim}}>STARTING</div><div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20}}>{char.ab.Luck}</div></div>
            <div style={{...S.card,textAlign:"center",flex:"1 1 70px"}}><div style={{fontSize:10,color:C.dim}}>CURRENT</div>
              {edit?<input type="number" value={char.currentLuck} onChange={e=>upd(c=>{c.currentLuck=parseInt(e.target.value)||3;})} style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20,color:C.text,background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:4,textAlign:"center",width:55}}/>:<div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20}}>{char.currentLuck}</div>}
              <div style={{fontSize:13,color:C.gold}}>{fm(luckMod)}</div></div>
            <div style={{...S.card,textAlign:"center",flex:"1 1 70px"}}><div style={{fontSize:10,color:C.dim}}>BURNED</div><div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20,color:C.red}}>{char.ab.Luck-char.currentLuck}</div></div>
            <div style={{...S.card,flex:"2 1 150px"}}><div style={{fontSize:10,color:C.dim}}>BIRTH AUGUR</div><div style={{fontSize:13,marginTop:4}}>{char.augur}</div></div>
            <div style={{display:"flex",flexDirection:"column",gap:4}}>
              <button style={S.btn} onClick={()=>upd(c=>{c.currentLuck=Math.max(3,c.currentLuck-1);})}>Burn 1</button>
              <button style={S.btn} onClick={()=>upd(c=>{c.currentLuck=Math.min(18,c.currentLuck+1);})}>+1 Luck</button>
            </div>
          </div>

          <Section>Saving Throws</Section>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {["Fortitude","Reflex","Willpower"].map(sn=>{
              const sv = saves[sn];
              const abName = SAVE_AB[sn];
              const parts = [`Base ${fm(lv[sn.toLowerCase().slice(0,4)])}`, `${abName} ${fm(abilMod(abName))}`];
              if (SAVE_MISC[sn] !== 0) parts.push(`Misc ${fm(SAVE_MISC[sn])}`);
              if (sn==="Willpower" && char.shieldOn) parts.push("Shield +2");
              if (sn==="Willpower" && char.wolfspearEquipped) parts.push("Wolfspear +1");
              return <div key={sn} style={{...S.card,textAlign:"center",cursor:"pointer"}} onClick={()=>rollSave(sn)}>
                <div style={{fontSize:11,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{sn}</div>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:22}}>{fm(sv)}</div>
                <div style={{fontSize:10,color:C.dim,marginTop:2}}>{parts.join(" + ")}</div>
                <div style={{fontSize:9,color:C.faint,fontStyle:"italic",marginTop:2}}>click to roll</div>
              </div>;
            })}
          </div>

          <Section>Derived Stats</Section>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {[
              {v:fm(meleeAtk),l:"Melee Atk",f:`Atk ${fm(lv.atk)} + STR ${fm(abilMod("Strength"))}`,click:()=>doRoll(`1d20${fm(meleeAtk)}`,"Melee Attack")},
              {v:fm(rangedAtk),l:"Ranged Atk",f:`Atk ${fm(lv.atk)} + AGI ${fm(abilMod("Agility"))}`,click:()=>doRoll(`1d20${fm(rangedAtk)}`,"Ranged Attack")},
              {v:fm(spellCheck),l:"Spell Check",f:"Per character sheet",click:()=>doRoll(`1d20${fm(spellCheck)}`,"Spell Check")},
              {v:lv.ad,l:"Action Dice",click:()=>doRoll(lv.ad,"Action Die")},
              {v:lv.cd,l:`Crit Die / ${lv.ct}`,click:()=>doRoll(lv.cd,"Crit Die")},
              {v:char.armorOn?armorFD:"—",l:"Fumble Die",f:char.armorOn?"Scale Mail":"No armor",click:char.armorOn?()=>doRoll(armorFD,"Fumble Die"):undefined},
            ].map((d,i)=>(
              <div key={i} style={{...S.card,textAlign:"center",cursor:d.click?"pointer":"default"}} onClick={d.click}>
                <div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:d.click?C.green:C.text}}>{d.v}</div>
                <div style={{fontSize:10,color:C.gold,letterSpacing:1,textTransform:"uppercase",marginTop:2}}>{d.l}</div>
                {d.f && <div style={{fontSize:9,color:C.dim,marginTop:2}}>{d.f}</div>}
                {d.click && <div style={{fontSize:9,color:C.faint,fontStyle:"italic",marginTop:1}}>click to roll</div>}
              </div>
            ))}
          </div>
        </>}

        {/* COMBAT TAB */}
        {tab==="combat" && <>
          <Section>Hit Points</Section>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:12}}>
            <button style={{...S.btn,width:36,height:36,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>upd(c=>{c.hp=Math.max(0,c.hp-1);})}>−</button>
            <div style={{flex:1,position:"relative"}}>
              <div style={{height:30,background:C.bgMid,borderRadius:6,border:`1px solid ${C.border}`,overflow:"hidden"}}>

              <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",display:"flex",alignItems:"center",gap:4}}>

              </div>
            </div>
            <button style={{...S.btn,width:36,height:36,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>upd(c=>{c.hp=Math.min(c.maxHp,c.hp+1);})}>+</button>
            {edit && <button style={{...S.btn,fontSize:11}} onClick={()=>{const v=prompt("Set max HP:",char.maxHp);if(v)upd(c=>{c.maxHp=parseInt(v);c.hp=Math.min(c.hp,c.maxHp);});}}>Set Max</button>}

          <Section>Armor & Defense — AC {ac}</Section>
          <div style={S.card}>
            <div style={{display:"flex",gap:16,flexDirection:"column",marginBottom:8}}>

                {key:"armorOn",label:`Mithral Scale Mail (+4 AC, Fumble ${armorFD}, Check -4)`},
                {key:"shieldOn",label:"Bronze Lion Shield (+2 AC, +2 Will, -2 enemy morale, sacrifice on crit to negate damage)"},

                  <span onClick={()=>upd(c=>{c[key]=!c[key];})} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",width:20,height:20,minWidth:20,border:`2px solid ${C.gold}`,borderRadius:4,background:char[key]?C.gold:"transparent",color:char[key]?C.bg:"transparent",fontSize:14,fontWeight:700,cursor:"pointer",marginTop:1}}>{char[key]?"✓":""}</span>
                  <span>{label}</span>
                </label>
              ))}
            </div>
            <div style={{fontSize:13,color:C.dim}}>AC <strong style={{color:C.text,fontSize:16}}>{ac}</strong> = 10 + AGI {fm(abilMod("Agility"))}{char.armorOn?" + Armor 4":""}{char.shieldOn?" + Shield 2":""}</div>
            <div style={{fontSize:13,color:C.dim,marginTop:4}}>Will: {fm(saves.Willpower)} (base {fm(lv.will)} + PER {fm(abilMod("Personality"))}{SAVE_MISC.Willpower!==0?` + misc ${fm(SAVE_MISC.Willpower)}`:""}{char.shieldOn?" + shield 2":""}{char.wolfspearEquipped?" + wolfspear 1":""})</div>
            <div style={{fontSize:12,color:C.red,fontStyle:"italic",marginTop:8}}>Iron Vulnerability: Iron weapons deal +1d6 extra damage. Cannot wear iron armor.</div>
          </div>

          <Section>Weapons</Section>
          {weapons.map((w,i)=>(
            <div key={i} style={S.card}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:6}}>
                <span style={{fontWeight:700,fontSize:15}}>{w.name}</span>
                <div style={{display:"flex",gap:6}}>
                  <button style={S.btn} onClick={()=>rollAttack(w)}>⚔ Attack ({fm(w.totalAtk)})</button>
                  <button style={S.btn} onClick={()=>doRoll(w.totalDmg,`${w.name} Damage`)}>💥 {w.totalDmg}</button>
                </div>
              </div>
              <div style={{fontSize:12,color:C.dim,marginTop:4,display:"flex",gap:12,flexWrap:"wrap"}}>
                {w.range && <span>Range: {w.range}</span>}
                <span style={{color:C.gold,fontStyle:"italic"}}>{w.notes}</span>
              </div>
            </div>
          ))}

          <Section>Combat Reference</Section>
          <div style={S.card}>
            <div style={{fontSize:13,color:C.dim,lineHeight:1.6}}>
              <strong style={{color:C.gold}}>Action Dice:</strong> {lv.ad}<br/>
              <strong style={{color:C.gold}}>Critical Hits:</strong> On natural 20, roll <span style={{cursor:"pointer",color:C.green,textDecoration:"underline"}} onClick={()=>doRoll(lv.cd,"Crit Die")}>{lv.cd}</span> on Table {lv.ct} + level<br/>
              <strong style={{color:C.gold}}>Fumbles:</strong> On natural 1, roll <span style={{cursor:"pointer",color:C.red,textDecoration:"underline"}} onClick={()=>doRoll(armorFD,"Fumble Die")}>{armorFD}</span> on fumble table
            </div>
          </div>
        </>}

        {/* SPELLS TAB */}
        {tab==="spells" && <>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
            <Section>Known Spells</Section>
            <div style={{background:"rgba(78,204,163,0.15)",border:`1px solid ${C.green}`,color:C.green,padding:"4px 12px",borderRadius:12,fontSize:13,fontWeight:700}}>Spell Check: d20 {fm(spellCheck)}</div>
          </div>
          {lv.ss.length>0 && <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            {lv.ss.map((c,i)=><div key={i} style={{background:C.goldDim,border:"1px solid rgba(201,168,76,0.25)",borderRadius:6,padding:"3px 10px",display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:10,color:C.dim}}>L{i+1}</span><span style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:15,color:C.gold}}>{c}</span></div>)}
          </div>}
          
          {[1,2,3].filter(lev=>spells.some(s=>s.level===lev)).map(lev=>(
            <div key={lev}>
              <div style={{fontSize:12,fontWeight:700,color:C.dim,letterSpacing:1,textTransform:"uppercase",margin:"14px 0 6px",paddingBottom:4,borderBottom:`1px solid ${C.border}`}}>Level {lev} Spells</div>
              {spells.filter(s=>s.level===lev).map((sp)=>{
                const idx = spells.indexOf(sp);
                const isOpen = expanded[idx];
                const castDie = sp.name==="Detect Magic"?"2d10":"d20";
                const bonus = spellCheck + (sp.name==="Lethal Blow"?frozenLuckMod:0);
                return <div key={idx} style={{...S.card,opacity:sp.lost?0.4:1}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",padding:"2px 0"}} onClick={()=>setExpanded(p=>({...p,[idx]:!p[idx]}))}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      <span style={{fontWeight:700,fontSize:14}}>{sp.name}</span>
                      {sp.lost && <span style={{fontSize:9,background:C.red,color:"#fff",padding:"1px 5px",borderRadius:3}}>LOST</span>}
                      {sp.patron && <span style={{fontSize:9,background:C.yellow,color:C.bg,padding:"1px 5px",borderRadius:3,fontWeight:700}}>YVRION</span>}
                    </div>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {!sp.lost ? <button style={S.greenBtn} onClick={e=>{e.stopPropagation();rollSpellCheck(idx);}}>Cast ({castDie}{fm(bonus)})</button>
                        : <button style={S.btn} onClick={e=>{e.stopPropagation();upd(c=>{const sl={...(c.spellsLost||{})};delete sl[idx];c.spellsLost=sl;});}}>Recover</button>}
                      <span style={{color:C.dim,fontSize:13}}>{isOpen?"▾":"▸"}</span>
                    </div>
                  </div>
                  {isOpen && <div style={{borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:6}}>
                    {sp.meta && <div style={{fontSize:12,color:C.blue,marginBottom:4}}>{sp.meta}</div>}
                    <p style={{fontSize:13,color:"#a09888",lineHeight:1.5,margin:"4px 0"}}>{sp.desc}</p>
                    {sp.merc && sp.merc!=="none" && sp.merc!=="" && <div style={{background:"rgba(201,168,76,0.1)",border:"1px solid rgba(201,168,76,0.25)",borderRadius:6,padding:"6px 10px",fontSize:12,color:C.gold,marginTop:6}}><strong>Mercurial Magic:</strong> {sp.merc}</div>}
                    {sp.misfire && sp.misfire!=="N/A" && <div style={{background:"rgba(231,76,60,0.08)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:6,padding:"6px 10px",fontSize:11,color:C.red,marginTop:4}}><strong>Misfire:</strong> {sp.misfire}</div>}
                    {sp.corruption && <div style={{background:"rgba(147,51,234,0.08)",border:"1px solid rgba(147,51,234,0.25)",borderRadius:6,padding:"6px 10px",fontSize:11,color:"#b07cd8",marginTop:4}}><strong>Corruption:</strong> {sp.corruption}</div>}
                    {sp.results && sp.results.length>0 && <div style={{marginTop:8}}>
                      <div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:C.gold,marginBottom:4}}>Spell Check Results</div>
                      {sp.results.map((r,ri)=><div key={ri} style={{display:"flex",gap:8,padding:"3px 0",borderBottom:"1px solid rgba(58,54,49,0.2)",fontSize:12,lineHeight:1.45}}>
                        <span style={{color:C.gold,fontWeight:700,minWidth:44,flexShrink:0}}>{r.r}</span>
                        <span style={{color:"#a09888"}}>{r.t}</span>
                      </div>)}
                    </div>}
                  </div>}
                </div>;
              })}
            </div>
          ))}
        </>}

        {/* PATRON TAB */}
        {tab==="patron" && <>
          <Section>Patron: Yvrion</Section>
          <div style={{background:`linear-gradient(135deg,${C.bgCard},rgba(232,200,76,0.05))`,border:`1px solid ${C.yellow}`,borderRadius:10,padding:16,marginBottom:12}}>
            <div style={{fontFamily:"'Cinzel',serif",fontSize:18,fontWeight:700,color:C.yellow,marginBottom:6}}>YVRION — Warden of Sacred Forests</div>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.6}}>Warden of sacred forests, master of the hunt, paragon of the elven bowman, swordsman supreme. Close ally of the King of Elfland. Bold, quick to action, even rashly. Deadly with sword and bow, he patrols the multiverse confronting problems before they become dire.</p>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.6,marginTop:8}}>Yvrion has learnt deeply of the spirits — natural world and weapon spirits alike. He uses devotees as his hands, eyes and ears across the cosmos.</p>
            <div style={{marginTop:12}}><div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:C.yellow,letterSpacing:1,marginBottom:4}}>PATRON SPELLS</div>
              <p style={{fontSize:13,color:"#a09888"}}>Level 1: <strong>Lethal Blow</strong> — Unstoppable weapon strike<br/>Level 2: <strong>Relentless Hunter</strong> — Preternatural tracking<br/>Level 3: <strong>Fell Sword of Yvrion</strong> — Vengeful blade spirit</p>
            </div>
          </div>

          <Section>Relentless Hunter (Level 2 Patron Spell)</Section>
          <div style={S.card}>
            <div style={{fontSize:12,color:C.blue,marginBottom:6}}>Range: Self/special | Duration: Varies | Cast: 1 action | Save: None; Will vs. check (brand)</div>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.5,marginBottom:8}}>Seasoned devotees of Yvrion gain preternatural senses for tracking quarry. Can be cast on self (tracking bonuses) or on a target (mystical brand).</p>
            <div style={{fontSize:12,color:C.dim,marginBottom:4,fontStyle:"italic"}}>Manifestation 1d6: (1) tiny compass; (2) glowing arrow; (3) wet nose/flaring nostrils; (4) eyes glow green; (5) senses tingle; (6) world darkens, target highlighted.</div>
            <div style={{marginTop:8}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:C.gold,marginBottom:4}}>Spell Check Results</div>
              {[
                {r:"1",t:"Lost, failure, patron taint."},
                {r:"2-11",t:"Lost, failure."},
                {r:"12-13",t:"Failure, spell not lost."},
                {r:"14-15",t:"SELF: Skilled tracking +3 for 1d6×CL turns. BRAND: Target branded 24 hrs/CL. Visible only to caster or detect magic. Pierces disguise/polymorph/invisibility. Dispel as minor curse."},
                {r:"16-19",t:"SELF: Trained tracking +5 for 2d6×CL turns. BRAND: Target branded 1 week/CL. Pierces all disguise. Dispel as moderate curse."},
                {r:"20-21",t:"SELF: Trained tracking +7 for 2d12×CL turns. BRAND: Branded 1 month/CL. Dispel as major curse."},
                {r:"22-25",t:"SELF: Trained +8 for 1d6×CL hours. Perceive month-old tracks as fresh. Disguised tracks obvious. +5 vs magical track-hiding. BRAND: Know direction for 6 hrs/CL. Lose if target leaves plane."},
                {r:"26-29",t:"SELF: Trained +9 for 2d6×CL hours. Two-month tracks fresh. +7 vs magic. BRAND: Direction for 12 hrs/CL. Within 1 mile: exact distance."},
                {r:"30-31",t:"SELF: Trained +11 for 2d12×CL hours. Three-month tracks. +8 vs magic. Smell creature types 1 mile. BRAND: Direction for 24 hrs/CL. Within 100 miles: exact distance."},
                {r:"32-33",t:"SELF: Trained +12 for 1d6×CL days. Three-month tracks. +9 vs magic. Smell 5 miles. BRAND: Exact location for 1d6+CL weeks. Know which plane if target flees."},
                {r:"34+",t:"SELF: Trained +13 for 2d6×CL days. Four-month tracks. +10 vs magic. Smell 10 miles. BRAND: Exact location for 2d6+CL months. Know plane if fled. Also imbue weapon with Bane effect (Table 8-5) vs target."},
              ].map((r,ri)=><div key={ri} style={{display:"flex",gap:8,padding:"3px 0",borderBottom:"1px solid rgba(58,54,49,0.2)",fontSize:12,lineHeight:1.45}}>
                <span style={{color:C.gold,fontWeight:700,minWidth:44,flexShrink:0}}>{r.r}</span>
                <span style={{color:"#a09888"}}>{r.t}</span>
              </div>)}
            </div>
          </div>

          <Section>Fell Sword of Yvrion (Level 3 Patron Spell)</Section>
          <div style={S.card}>
            <div style={{fontSize:12,color:C.blue,marginBottom:6}}>Range: Self/blade | Duration: Varies | Cast: 1 action | Save: None</div>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.5,marginBottom:8}}>A vengeful blade spirit takes residence in the caster's blade. It glows with power and jerks toward enemies — eager to slake its lust for killing.</p>
            <div style={{marginTop:8}}>
              <div style={{fontFamily:"'Cinzel',serif",fontSize:12,fontWeight:700,color:C.gold,marginBottom:4}}>Spell Check Results</div>
              {[
                {r:"1",t:"Lost, failure, patron taint."},
                {r:"2-11",t:"Lost, failure."},
                {r:"12-15",t:"Failure, spell not lost."},
                {r:"16-17",t:"Green glow, 1d5+CL rds. +2 hit/dmg. Blade counts as magical. -2 to fumble table."},
                {r:"18-21",t:"Green glow, 1d6+CL rds. +2 hit/dmg. Magical. -2 fumble. +2 crit bonus."},
                {r:"22-23",t:"Yellow radiance, 1d8+CL rds. +3 hit/dmg. Magical. -5 fumble. Crit as Cleric same level. Bloodlust: must attack only."},
                {r:"24-26",t:"Yellow radiance, 2d5+CL rds. +3 hit/dmg. -10 fumble. Crit as Cleric +2 bonus. Bloodlust: must attack."},

                {r:"32-33",t:"Blue flame, 2d8+CL rds. +4 hit/dmg. Fumble ignored/attack ally. Crit range 19-20 as Cleric +5. Melee hits deal 2 less dmg to caster. 20% chance attacks ally. Must attack."},
                {r:"34-35",t:"Blue flame, 2d10+CL rds. +4 hit/dmg. Fumble/attack ally. Crit 19-20 as Warrior. -5 dmg from melee. 30% ally attack. Must attack."},
                {r:"36+",t:"White illumination, 2d10+CL rds. +5 hit/dmg. Fumble/attack ally. Crit 18-20 as Warrior +5. -5 dmg from melee. Gain 20% of dmg dealt as HP. 50% ally attack. Must attack."},
              ].map((r,ri)=><div key={ri} style={{display:"flex",gap:8,padding:"3px 0",borderBottom:"1px solid rgba(58,54,49,0.2)",fontSize:12,lineHeight:1.45}}>

                <span style={{color:"#a09888"}}>{r.t}</span>

            </div>
          </div>
          
          <Section>Patron Taint</Section>

            {[
              {t:"1. Way of the Hunt",d:"1st: Skilled hunting/tracking in woods. 2nd: Stealth (forester). 3rd: Any environment."},
              {t:"2. Wardenship",d:"1st: Protect a forest. 2nd: Task for another. 3rd: Dire emergency."},
              {t:"3. Chaotic Curse",d:"1st: +4 fumble rolls melee. 2nd: Fumble 3-7 attacks ally. 3rd: Malignant spirit."},
              {t:"4. Aid Elvenkind",d:"1st: Simple (1d4 days). 2nd: Important (1d4 weeks). 3rd: Fate of elves, extraplanar."},
              {t:"5. Psychic Echoes",d:"1st: DC6 Will to sleep. 2nd: DC8 Will or freeze in combat. 3rd: -1 PER permanent."},
              {t:"6. Otherworldly Tracking",d:"1st: See otherworldly tracks. 2nd: Skilled tracking. 3rd: +4 detect Elfland."},
            ].map((p,i)=><div key={i} style={{marginBottom:8}}><div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,marginBottom:2}}>{p.t}</div><p style={{fontSize:12,color:"#a09888",lineHeight:1.4}}>{p.d}</p></div>)}
          </div>

          <Section>Spellburn</Section>
          <div style={S.card}>
            {[
              {t:"1. Called to Battle",d:"Aid Yvrion momentarily. Return weary (STR/AGI/STA loss)."},
              {t:"2. Beleaguered",d:"Extra 1d6 ability damage requested. Token of appreciation if given."},
              {t:"3. Cosmic Lifeforce",d:"Elf Hound claims the damage. Connection fuels the spell."},
              {t:"4. Elven Emergency",d:"Side quest ≤5 days. Success earns reward."},
            ].map((p,i)=><div key={i} style={{marginBottom:8}}><div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,marginBottom:2}}>{p.t}</div><p style={{fontSize:12,color:"#a09888",lineHeight:1.4}}>{p.d}</p></div>)}
          </div>

          <Section>Elf Hound of Yvrion</Section>
          <div style={S.card}>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.5}}><strong>Init</strong> +5; <strong>Atk</strong> claw +6 (1d4+4) or bite +3 (1d6+1); <strong>AC</strong> 14; <strong>HD</strong> 3d8+3; <strong>MV</strong> 40'; <strong>SP</strong> infravision 120', tracking +2, sprint (×2 move), d5 Pushback; <strong>SV</strong> Fort/Ref/Will +4; <strong>AL</strong> L.</p>
            <div style={{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}}>
              <button style={S.btn} onClick={()=>doRoll("1d20+6","Hound Claw Atk")}>Claw +6</button>
              <button style={S.btn} onClick={()=>doRoll("1d4+4","Hound Claw Dmg")}>1d4+4</button>
              <button style={S.btn} onClick={()=>doRoll("1d20+3","Hound Bite Atk")}>Bite +3</button>
              <button style={S.btn} onClick={()=>doRoll("1d6+1","Hound Bite Dmg")}>1d6+1</button>
            </div>
          </div>
        </>}

        {/* ABILITIES TAB */}
        {tab==="abilities" && <>
          <Section>Elf Racial Abilities</Section>
          {[
            {n:"Heightened Senses",d:"Immune to magical sleep and paralysis. Infravision 60'. +4 to detect secret doors."},
            {n:"Iron Vulnerability",d:"Iron weapons deal +1d6 extra damage. Cannot wear iron armor. Iron shackles suppress spellcasting."},
            {n:"Patron Bond (Yvrion)",d:"Grants Invoke Patron, patron spells (Lethal Blow, Relentless Hunter, Fell Sword), patron-specific spellburn."},
            {n:"Infravision 60'",d:"See heat signatures in total darkness."},
            {n:"Mithril Equipment",d:"Use mithril instead of iron/steel. Scale Mail and Longsword are mithril."},
            {n:"Spellcasting",d:"Cast as wizard. Luck modifier applies to one level 1 spell."},
            {n:"Combat Training",d:"Fight with all weapons, wear mithril armor."},
            {n:"Luck → Lethal Blow",d:"Luck modifier permanently applies to Lethal Blow spell checks (chosen L1 spell per elf class rules). This bonus is fixed at the value when chosen and does not change as Luck changes."},
          ].map((ab,i)=><div key={i} style={{...S.card,cursor:"pointer"}} onClick={()=>setExpanded(p=>({...p,[`ab${i}`]:!p[`ab${i}`]}))}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:C.gold}}>{ab.n}</span>
              <span style={{color:C.dim,fontSize:13}}>{expanded[`ab${i}`]?"▾":"▸"}</span>
            </div>
            {expanded[`ab${i}`] && <p style={{fontSize:13,color:"#a09888",lineHeight:1.5,marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6}}>{ab.d}</p>}
          </div>)}
          <Section>Languages</Section>
          <div style={S.card}><p style={{fontSize:13,color:"#a09888"}}>{char.langs}</p></div>
          <Section>Notes</Section>
          <div style={S.card}>{edit?<textarea value={char.notes} onChange={e=>upd(c=>{c.notes=e.target.value;})} rows={3} style={{width:"100%",background:C.bgMid,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:8,fontFamily:"'Crimson Text',serif",fontSize:13,resize:"vertical"}}/>:<p style={{fontSize:13,color:"#a09888"}}>{char.notes||"None"}</p>}</div>
        </>}

        {/* GEAR TAB */}
        {tab==="elf" && <>
          <Section>Elf Class Overview</Section>
          <div style={S.card}>
            <p style={{fontSize:13,color:"#a09888",lineHeight:1.6}}>Elves are ancient, long-lived beings who wield both sword and sorcery. Unlike other classes, an elf's race <em>is</em> the class — combining warrior combat ability with wizard-like spellcasting. All elves are bonded to a supernatural patron at level 1, gaining Invoke Patron and patron-specific spells.</p>
          </div>

          <Section>Level Progression</Section>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${C.gold}`}}>
                {["Lvl","Title","Atk","Crit/Table","Act Dice","Known*","Max Lvl","Ref","Fort","Will"].map(h=>
                  <th key={h} style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                )}
              </tr></thead>
              <tbody>{ELF_LEVELS.slice(1).map(lv=>(
                <tr key={lv.l} style={{borderBottom:`1px solid ${C.border}`,background:lv.l===char.level?"rgba(201,168,76,0.1)":"transparent"}}>
                  <td style={{padding:"4px 6px",fontWeight:lv.l===char.level?700:400,color:lv.l===char.level?C.gold:C.text}}>{lv.l}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{lv.title}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{fm(lv.atk)}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{lv.cd}/{lv.ct}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{lv.ad}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{lv.ks}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{lv.ms}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{fm(lv.ref)}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{fm(lv.fort)}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{fm(lv.will)}</td>
                </tr>
              ))}</tbody>
            </table>
            <div style={{fontSize:11,color:C.faint,fontStyle:"italic",marginTop:4}}>* Known Spells includes patron bond + invoke patron. Max Spell Level = highest spell level accessible.</div>
          </div>

          <Section>Core Class Features</Section>
          {[
            {n:"Hit Points",d:"An elf gains 1d6 hit points per level."},
            {n:"Weapon Training",d:"Trained in dagger, javelin, lance, longbow, longsword, shortbow, short sword, staff, spear, and two-handed sword. Elves often wear armor of mithril, even though it affects spellcasting."},
            {n:"Mithril Equipment",d:"At 1st level, an elf may purchase one piece of armor and one weapon of mithril at no extra cost. Mithril weighs slightly less than iron/steel and can be worn without the pain of iron. Zenith has mithril scale mail and mithril longsword."},
            {n:"Magic",d:"Elves cast spells as wizards, forming relationships with extraplanar patrons over centuries. All elves have one or more patrons who sustain their magic. Spells tend toward elemental or demonic powers. Elf spells determined randomly like wizard's, except for patron bond and invoke patron."},
            {n:"Caster Level",d:"An elf's caster level equals his level. E.g. a 2nd-level elf has caster level 2."},
            {n:"Supernatural Patrons",d:"All elves automatically receive patron bond and invoke patron at 1st level, in addition to other spells. These provide the framework for the elf-patron relationship."},
            {n:"Infravision",d:"An elf can see in the dark up to 60'."},
            {n:"Immunities",d:"Elves are immune to magical sleep and paralysis."},
            {n:"Vulnerabilities (Iron)",d:"Extremely sensitive to iron. Direct contact causes burning; prolonged exposure is uncomfortable. Cannot wear iron armor or bear iron weapons for extended periods. Prolonged contact causes 1 hp damage per day. In combat, non-magical iron weapons deal additional damage (typically +1d6 per house rules)."},
            {n:"Heightened Senses",d:"All elves receive +4 bonus to detect secret doors. When simply passing within 10 feet of a secret door, elves are entitled to a check to detect it."},
            {n:"Luck",d:"An elf may choose to apply his Luck modifier to spell checks on one spell of his choosing at 1st level. That modifier does not change as the elf's Luck score changes."},
            {n:"Languages",d:"At 1st level, an elf knows Common, the elven racial language, and one other language. An elf knows one additional language for every point of Int modifier. Additional languages determined randomly per Appendix L."},
            {n:"Action Dice",d:"An elf's action dice can be used for attacks OR spell checks at any level. At 5th level, can cast two spells (d20 + d14), make two attacks (d20 + d14), or combine attack + spell check. Mercurial magic results may supersede the action die for spell checks."},
            {n:"Alignment",d:"Elves tend toward chaotic and neutral alignments. Because they outlive many institutions of authority, elves are not often lawful."},
          ].map((item,i)=><div key={i} style={{...S.card,cursor:"pointer"}} onClick={()=>setExpanded(p=>({...p,[`elf${i}`]:!p[`elf${i}`]}))}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:C.gold,fontSize:13}}>{item.n}</span>
              <span style={{color:C.dim,fontSize:13}}>{expanded[`elf${i}`]?"▾":"▸"}</span>
            </div>
            {expanded[`elf${i}`] && <p style={{fontSize:13,color:"#a09888",lineHeight:1.6,marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6}}>{item.d}</p>}
          </div>)}

          <Section>Armor & Spell Check Penalties</Section>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${C.gold}`}}>
                {["Armor","AC Bonus","Check Penalty","Fumble Die","Speed Penalty","Spell Check Penalty"].map(h=>
                  <th key={h} style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left"}}>{h}</th>
                )}
              </tr></thead>
              <tbody>{[
                {a:"Unarmored",ac:"+0",cp:"—",fd:"d4",sp:"—",scp:"None"},
                {a:"Padded",ac:"+1",cp:"-1",fd:"d8",sp:"—",scp:"-1"},
                {a:"Leather",ac:"+2",cp:"-2",fd:"d8",sp:"—",scp:"-2"},
                {a:"Studded Leather",ac:"+3",cp:"-3",fd:"d8",sp:"—",scp:"-3"},
                {a:"Hide",ac:"+3",cp:"-3",fd:"d8",sp:"—",scp:"-3"},
                {a:"Scale Mail (Mithril)",ac:"+4",cp:"-4",fd:"d12",sp:"—",scp:"-4",hl:true},
                {a:"Chain Mail",ac:"+5",cp:"-5",fd:"d12",sp:"-5'",scp:"-5"},
                {a:"Banded Mail",ac:"+6",cp:"-6",fd:"d12",sp:"-5'",scp:"-6"},
                {a:"Half Plate",ac:"+7",cp:"-8",fd:"d16",sp:"-5'",scp:"-8"},
                {a:"Full Plate",ac:"+8",cp:"-8",fd:"d16",sp:"-10'",scp:"-8"},
                {a:"Shield",ac:"+1",cp:"-1",fd:"+d",sp:"—",scp:"-1"},
              ].map((r,i)=>(
                <tr key={i} style={{borderBottom:`1px solid ${C.border}`,background:r.hl?"rgba(201,168,76,0.1)":"transparent"}}>
                  <td style={{padding:"4px 6px",fontWeight:r.hl?700:400,color:r.hl?C.gold:C.text}}>{r.a}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{r.ac}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{r.cp}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{r.fd}</td>
                  <td style={{padding:"4px 6px",color:C.dim}}>{r.sp}</td>
                  <td style={{padding:"4px 6px",color:r.hl?C.orange:C.dim}}>{r.scp}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{fontSize:11,color:C.faint,fontStyle:"italic",marginTop:6}}>Note: Zenith's Mithril Scale Mail is highlighted. Shield penalty stacks. Spell check penalty = check penalty for elves.</div>

          <Section>Key DCC Mechanics Reference</Section>
          {[
            {n:"Spellburn",d:"Temporarily sacrifice STR, AGI, or STA (in any combination) to add the same amount to a spell check. Points recover at 1/day. Patron-specific narrative effects apply (see Patron tab). Spellburn is declared before the roll."},
            {n:"Spell Loss & Recovery",d:"Spells are lost for the day on a failed check (result below 12) or natural 1. Natural 1 also triggers misfire + corruption/patron taint. Lost spells recover after 8 hours of rest. Invoke Patron (Yvrion) is NOT lost on 2-11, only on natural 1."},
            {n:"Mercurial Magic",d:"Each spell has a permanent mercurial magic effect rolled at character creation. Effects range from beneficial to hazardous. Detect Magic uses 2d10 instead of d20 (Joe Average). Ropework triggers Tide of Ash. Enlarge has Stolen Knowledge."},
            {n:"Corruption & Patron Taint",d:"When corruption is indicated, elves roll on their patron's taint table instead of the standard corruption table. Results are cumulative — rolling the same entry a 2nd or 3rd time escalates the effect. See Patron tab for Yvrion's taint table."},
          ].map((item,i)=><div key={i} style={{...S.card,cursor:"pointer"}} onClick={()=>setExpanded(p=>({...p,[`mech${i}`]:!p[`mech${i}`]}))}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:700,color:C.gold,fontSize:13}}>{item.n}</span>
              <span style={{color:C.dim,fontSize:13}}>{expanded[`mech${i}`]?"▾":"▸"}</span>
            </div>
            {expanded[`mech${i}`] && <p style={{fontSize:13,color:"#a09888",lineHeight:1.6,marginTop:6,borderTop:`1px solid ${C.border}`,paddingTop:6}}>{item.d}</p>}
          </div>)}

          <Section>Crit Table II: Thieves & Elves</Section>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${C.gold}`}}>
                <th style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left",width:40}}>Roll</th>
                <th style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left"}}>Result</th>
              </tr></thead>
              <tbody>{Object.entries(CRIT_TABLE_II).map(([k,v])=>(
                <tr key={k} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:"4px 6px",fontWeight:700,color:C.green,fontFamily:"'Cinzel',serif"}}>{k}</td>
                  <td style={{padding:"4px 6px",color:C.text,lineHeight:1.4}}>{v}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{fontSize:11,color:C.dim,marginTop:4,fontStyle:"italic"}}>Roll = crit die + character level. Your current crit: {lv.cd}+{char.level}.</div>

          <Section>Table 4-2: Fumbles</Section>
          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{borderBottom:`2px solid ${C.gold}`}}>
                <th style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left",width:40}}>Roll</th>
                <th style={{padding:"4px 6px",color:C.gold,fontFamily:"'Cinzel',serif",fontSize:11,textAlign:"left"}}>Result</th>
              </tr></thead>
              <tbody>{Object.entries(FUMBLE_TABLE).map(([k,v])=>(
                <tr key={k} style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:"4px 6px",fontWeight:700,color:C.red,fontFamily:"'Cinzel',serif"}}>{k}{parseInt(k)===16?"+":""}</td>
                  <td style={{padding:"4px 6px",color:C.text,lineHeight:1.4}}>{v}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
          <div style={{fontSize:11,color:C.dim,marginTop:4,fontStyle:"italic"}}>Fumble die depends on armor: {armorFD} (Mithral Scale Mail). Unarmored = 1d4.</div>

          <div style={{marginTop:16,padding:12,background:"rgba(201,168,76,0.05)",border:`1px solid rgba(201,168,76,0.15)`,borderRadius:8,fontSize:12,color:C.faint,fontStyle:"italic"}}>
            Reference compiled from DCC RPG core rules and ADBB Elfland Edition. For complete rules text, consult the core rulebook.
          </div>
        </>}

        {tab==="gear" && <>
          <Section>Equipment</Section>
          {edit ? <textarea value={char.equipment.join("\n")} onChange={e=>upd(c=>{c.equipment=e.target.value.split("\n").filter(Boolean);})} rows={10} style={{width:"100%",background:C.bgMid,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:10,fontFamily:"'Crimson Text',serif",fontSize:13,resize:"vertical"}}/>
            : <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{char.equipment.map((it,i)=><div key={i} style={{...S.card,padding:"5px 10px",fontSize:13,marginBottom:0}}>{it}</div>)}</div>}
          <Section>Treasure</Section>
          <div style={{display:"flex",gap:8}}>
            {["cp","sp","ep","gp","pp"].map(c=>(
              <div key={c} style={{...S.card,textAlign:"center",flex:1}}>
                <div style={{fontSize:10,color:C.gold,letterSpacing:2,marginBottom:4}}>{c.toUpperCase()}</div>
                {edit?<input type="number" value={char.treasure[c]} onChange={e=>upd(ch=>{ch.treasure={...ch.treasure,[c]:parseInt(e.target.value)||0};})} style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18,color:C.text,background:C.goldDim,border:`1px solid ${C.gold}`,borderRadius:4,textAlign:"center",width:"100%"}}/>
                  :<div style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:18}}>{char.treasure[c]}</div>}
              </div>
            ))}
          </div>
          {char.treasure.other && <div style={{...S.card,marginTop:8}}><div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,marginBottom:4}}>Other Treasure</div>
            {edit?<textarea value={char.treasure.other} onChange={e=>upd(c=>{c.treasure={...c.treasure,other:e.target.value};})} rows={2} style={{width:"100%",background:C.bgMid,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:8,fontFamily:"'Crimson Text',serif",fontSize:13,resize:"vertical"}}/>
              :<p style={{fontSize:13,color:"#a09888"}}>{char.treasure.other}</p>}
          </div>}
        </>}

        {/* DICE TAB */}
        {tab==="log" && <>
          <Section>Quick Dice</Section>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {["1d3","1d4","1d5","1d6","1d7","1d8","1d10","1d12","1d14","1d16","1d20","1d24","1d30","1d100"].map(d=>
              <button key={d} style={{...S.card,padding:"5px 10px",cursor:"pointer",fontSize:12,marginBottom:0}} onClick={()=>doRoll(d,d)}>{d}</button>
            )}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><Section>Roll History</Section>
          {log.length>0 && <button style={{...S.btn,fontSize:11,padding:"3px 8px"}} onClick={()=>{setLog([]);try{localStorage.removeItem(SAVE_KEY+"_log");}catch(e){}}}>Clear Log</button>}</div>
          {log.length===0 && <p style={{fontSize:13,color:C.faint,fontStyle:"italic"}}>No rolls yet.</p>}
          {log.map(e=>(
            <div key={e.id} style={{...S.card,background:"rgba(42,37,32,0.4)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:13,color:C.gold}}>{e.label}</span>
                <span style={{fontSize:10,color:C.faint}}>{e.time}</span>
              </div>
              <div style={{display:"flex",alignItems:"baseline",gap:8}}>
                <span style={{fontFamily:"'Cinzel',serif",fontWeight:700,fontSize:20,color:C.green}}>{e.total}</span>
                <span style={{fontSize:12,color:C.dim}}>[{e.rolls.join(", ")}] {e.notation}</span>
              </div>
              {e.special && <div style={{marginTop:4,fontSize:12,fontWeight:700,color:e.good?C.green:C.red,background:e.good?"rgba(78,204,163,0.1)":"rgba(231,76,60,0.1)",padding:"3px 8px",borderRadius:4}}>{e.special}</div>}
            </div>
          ))}
          {log.length>0 && <button style={{...S.btn,marginTop:8}} onClick={()=>setLog([])}>Clear Log</button>}
        </>}
      </div>

      {/* ROLL OVERLAY */}
      {showOverlay && rollResult && (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:100,display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",animation:"fadeIn 0.1s ease-out"}}>
          <div style={{background:"rgba(20,17,14,0.92)",border:`2px solid ${rollResult.good?C.green:rollResult.special&&!rollResult.good?C.red:C.gold}`,borderRadius:16,padding:"24px 40px",textAlign:"center",boxShadow:`0 0 60px ${rollResult.good?"rgba(78,204,163,0.3)":rollResult.special&&!rollResult.good?"rgba(231,76,60,0.3)":"rgba(201,168,76,0.3)"}`,animation:"popIn 0.25s cubic-bezier(0.34,1.56,0.64,1)",minWidth:200}}>
            <div style={{fontSize:13,color:C.gold,fontFamily:"'Cinzel',serif",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{rollResult.label}</div>
            <div style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:56,color:rollResult.good?C.green:rollResult.special&&!rollResult.good?C.red:C.text,lineHeight:1,textShadow:`0 0 20px ${rollResult.good?"rgba(78,204,163,0.5)":"rgba(201,168,76,0.3)"}`}}>{rollResult.total}</div>
            <div style={{fontSize:14,color:C.dim,marginTop:6}}>[{rollResult.rolls.join(", ")}] {rollResult.notation}</div>
            {rollResult.special && <div style={{marginTop:8,fontSize:13,fontWeight:700,color:rollResult.good?C.green:C.red}}>{rollResult.special}</div>}
          </div>
        </div>
      )}

      {/* PERSISTENT LAST ROLL */}
      {rollResult && !showOverlay && (
        <div style={{position:"fixed",top:0,left:0,right:0,zIndex:40,background:"rgba(20,17,14,0.95)",borderBottom:`1px solid ${rollResult.good?C.green:rollResult.special&&!rollResult.good?C.red:C.gold}`,padding:"6px 20px",display:"flex",alignItems:"center",gap:12,justifyContent:"center",flexWrap:"wrap",animation:"slideDown 0.2s ease-out"}}>
          <span style={{fontSize:11,color:C.gold,fontFamily:"'Cinzel',serif",letterSpacing:1,textTransform:"uppercase"}}>{rollResult.label}</span>
          <span style={{fontFamily:"'Cinzel',serif",fontWeight:900,fontSize:22,color:rollResult.good?C.green:rollResult.special&&!rollResult.good?C.red:C.text}}>{rollResult.total}</span>
          <span style={{fontSize:12,color:C.dim}}>[{rollResult.rolls.join(", ")}] {rollResult.notation}</span>
          {rollResult.special && <span style={{fontSize:11,fontWeight:700,color:rollResult.good?C.green:C.red}}>{rollResult.special}</span>}
          <button onClick={()=>setRollResult(null)} style={{background:"none",border:"none",color:C.faint,cursor:"pointer",fontSize:14,marginLeft:8}}>✕</button>
        </div>
      )}

      {/* FLOATING DICE */}
      <div style={{position:"fixed",bottom:20,right:20,zIndex:50}}>
        {diceOpen && <div style={{background:C.bgMid,border:`1px solid ${C.gold}`,borderRadius:12,padding:14,marginBottom:8,boxShadow:"0 8px 32px rgba(0,0,0,0.6)",width:210}}>
          <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:C.gold,marginBottom:6}}>Quick Roll</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
            {["1d3","1d4","1d5","1d6","1d7","1d8","1d10","1d12","1d14","1d16","1d20","1d24","1d30","1d100"].map(d=>
              <button key={d} style={{background:C.bgCard,border:`1px solid ${C.border}`,color:C.text,padding:"5px 3px",borderRadius:4,cursor:"pointer",fontFamily:"'Crimson Text',serif",fontSize:11}} onClick={()=>doRoll(d,d)}>{d}</button>
            )}
          </div>
        </div>}
        <button onClick={()=>setDiceOpen(!diceOpen)} style={{width:48,height:48,borderRadius:"50%",background:C.gold,border:"none",fontSize:22,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.5)",display:"flex",alignItems:"center",justifyContent:"center"}}>🎲</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
